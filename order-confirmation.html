<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Fix-It Forward</title>
  <link rel="stylesheet" href="css/bootstrap.min.css" type="text/css">
  <link rel="stylesheet" href="css/font-awesome.min.css" type="text/css">
  <link rel="stylesheet" href="css/style.css" type="text/css">
  <style>
    .confirm-wrap { max-width: 760px; margin: 80px auto; padding: 28px; background: #fff; border: 1px solid #ececec; border-radius: 12px; }
    .confirm-chip { display: inline-block; padding: 6px 12px; border-radius: 999px; background: #eef7ef; color: #256029; font-weight: 600; }
    .confirm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
    .confirm-card { border: 1px solid #ececec; border-radius: 10px; padding: 12px; }
    @media (max-width: 700px) { .confirm-grid { grid-template-columns: 1fr; } .confirm-wrap { margin: 30px 12px; } }
  </style>
</head>
<body>
  <section class="shop-cart spad">
    <div class="container">
      <div class="confirm-wrap">
        <span class="confirm-chip">Order Confirmed</span>
        <h3 style="margin-top: 12px;">Thank you for your order</h3>
        <p id="confirm-subtitle">We are preparing your package.</p>

        <div class="confirm-grid">
          <div class="confirm-card">
            <h6>Order Reference</h6>
            <p id="confirm-order-id" style="margin:0; font-weight:700;">-</p>
          </div>
          <div class="confirm-card">
            <h6>Expected Delivery</h6>
            <p id="confirm-delivery" style="margin:0; font-weight:700;">In 2 days</p>
          </div>
          <div class="confirm-card">
            <h6>Tracking ID</h6>
            <p id="confirm-tracking" style="margin:0; font-weight:700;">-</p>
          </div>
          <div class="confirm-card">
            <h6>Current Status</h6>
            <p id="confirm-status" style="margin:0; font-weight:700;">Confirmed</p>
          </div>
        </div>

        <p style="margin-top: 18px;">Redirecting to your profile in <span id="redirect-count">5</span> seconds...</p>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <a href="account.html" class="site-btn">Go to Profile</a>
          <a href="orders.html" class="site-btn" style="background:#666;">View Orders</a>
        </div>
      </div>
    </div>
  </section>

  <script src="js/api-config.js"></script>
  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script src="js/order-confirmation.js"></script>
</body>
</html>
